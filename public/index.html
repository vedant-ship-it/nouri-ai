<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouri AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .tagline {
      color: #a0aec0;
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      backdrop-filter: blur(12px);
    }

    .field {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a0aec0;
      margin-bottom: 0.5rem;
    }

    textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea::placeholder {
      color: #4a5568;
    }

    textarea:focus {
      border-color: #ffd200;
    }

    .pill-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill {
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .pill:hover {
      border-color: #ffd200;
      color: #ffd200;
    }

    .pill.selected {
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border-color: transparent;
      color: #1a1a2e;
      font-weight: 700;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-card {
      margin-top: 1.8rem;
      background: rgba(247, 151, 30, 0.08);
      border: 1px solid rgba(247, 151, 30, 0.25);
      border-radius: 16px;
      padding: 1.5rem;
      display: none;
      width: 100%;
      max-width: 520px;
      animation: fadeIn 0.4s ease;
    }

    .result-card.visible {
      display: block;
    }

    .result-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffd200;
      margin-bottom: 0.8rem;
    }

    .result-text {
      font-size: 1rem;
      line-height: 1.75;
      color: #e2e8f0;
    }

    .result-text h1,
    .result-text h2,
    .result-text h3 {
      color: #ffd200;
      margin: 0.6rem 0 0.3rem;
      font-size: 1rem;
    }

    .result-text strong {
      color: #ffffff;
    }

    .result-text ul {
      padding-left: 1.2rem;
      margin: 0.4rem 0;
    }

    .result-text li {
      margin: 0.25rem 0;
    }

    .result-text p {
      margin: 0.4rem 0;
    }

    .share-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 12px;
      border: 1px solid rgba(247, 151, 30, 0.4);
      background: transparent;
      color: #ffd200;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .share-btn:hover {
      background: rgba(247, 151, 30, 0.1);
    }

    .share-btn.copied {
      border-color: #68d391;
      color: #68d391;
    }

    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(26, 26, 46, 0.4);
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .spinner.visible {
      display: block;
    }

    .error-text {
      color: #fc8181;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }

    .error-text.visible {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .logo { font-size: 2.2rem; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Nouri AI</div>
    <div class="tagline">Your friendly nutrition companion</div>
  </div>

  <div class="card">
    <div class="field">
      <label>What did you eat today?</label>
      <textarea id="food" rows="3" placeholder="e.g. Vada pav, dal chawal, biryani..."></textarea>
    </div>

    <div class="field">
      <label>Your Goal</label>
      <div class="pill-group" id="goal-group">
        <div class="pill" data-value="weight loss">Weight Loss</div>
        <div class="pill" data-value="muscle gain">Muscle Gain</div>
        <div class="pill" data-value="maintenance">Maintenance</div>
      </div>
    </div>

    <div class="field">
      <label>Preferred Language</label>
      <div class="pill-group" id="lang-group">
        <div class="pill" data-value="Hindi">Hindi</div>
        <div class="pill" data-value="English">English</div>
        <div class="pill" data-value="Hinglish">Hinglish</div>
      </div>
    </div>

    <div class="error-text" id="error-msg">Please fill in all fields before analyzing.</div>

    <button class="submit-btn" id="submit-btn" onclick="analyze()">
      <span id="btn-label">Analyze My Meals</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-label">Nouri's Analysis</div>
    <div class="result-text" id="result-text"></div>
    <button class="share-btn" id="share-btn" onclick="shareAnalysis()">Share on WhatsApp</button>
  </div>

  <script>
    let selectedGoal = null;
    let selectedLang = null;
    let rawResult = "";

    function renderMarkdown(text) {
      return text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/^#{1,3} (.+)$/gm, "<h3>$1</h3>")
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/^[-*] (.+)$/gm, "<li>$1</li>")
        .replace(/(<li>.*<\/li>)/s, "<ul>$1</ul>")
        .replace(/\n{2,}/g, "</p><p>")
        .replace(/^(?!<[hul])(.+)$/gm, (line) => line.startsWith("<") ? line : `<p>${line}</p>`)
        .replace(/<p><\/p>/g, "");
    }

    function shareAnalysis() {
      const btn = document.getElementById("share-btn");
      navigator.clipboard.writeText(rawResult).then(() => {
        btn.textContent = "Copied! Paste it on WhatsApp";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Share on WhatsApp";
          btn.classList.remove("copied");
        }, 3000);
      }).catch(() => {
        btn.textContent = "Copy failed — try again";
      });
    }

    document.querySelectorAll("#goal-group .pill").forEach(pill => {
      pill.addEventListener("click", () => {
        document.querySelectorAll("#goal-group .pill").forEach(p => p.classList.remove("selected"));
        pill.classList.add("selected");
        selectedGoal = pill.dataset.value;
      });
    });

    document.querySelectorAll("#lang-group .pill").forEach(pill => {
      pill.addEventListener("click", () => {
        document.querySelectorAll("#lang-group .pill").forEach(p => p.classList.remove("selected"));
        pill.classList.add("selected");
        selectedLang = pill.dataset.value;
      });
    });

    async function analyze() {
      const food = document.getElementById("food").value.trim();
      const errorMsg = document.getElementById("error-msg");
      const resultCard = document.getElementById("result-card");
      const resultText = document.getElementById("result-text");
      const btn = document.getElementById("submit-btn");
      const btnLabel = document.getElementById("btn-label");
      const spinner = document.getElementById("spinner");

      errorMsg.classList.remove("visible");

      if (!food || !selectedGoal || !selectedLang) {
        errorMsg.textContent = !food
          ? "Please describe what you ate today."
          : !selectedGoal
          ? "Please select a goal."
          : "Please select a language.";
        errorMsg.classList.add("visible");
        return;
      }

      btn.disabled = true;
      btnLabel.style.display = "none";
      spinner.classList.add("visible");
      resultCard.classList.remove("visible");

      try {
        const res = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ food, goal: selectedGoal, language: selectedLang }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Something went wrong.");

        rawResult = data.result;
        resultText.innerHTML = renderMarkdown(data.result);
        resultCard.classList.add("visible");
        const shareBtn = document.getElementById("share-btn");
        shareBtn.textContent = "Share on WhatsApp";
        shareBtn.classList.remove("copied");
      } catch (err) {
        errorMsg.textContent = "Error: " + err.message;
        errorMsg.classList.add("visible");
      } finally {
        btn.disabled = false;
        btnLabel.style.display = "block";
        spinner.classList.remove("visible");
      }
    }
  </script>

</body>
</html>
